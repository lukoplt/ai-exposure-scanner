name: macOS Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

# Required so softprops/action-gh-release can create the GitHub Release
# entry and upload assets via the default GITHUB_TOKEN.
permissions:
  contents: write

jobs:
  package:
    name: Build macOS DMG
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5
      - name: Build release executable
        run: swift build --package-path macos/Scanner --configuration release --product AIExposureScannerApp
      - name: Build standalone updater binary
        run: swift build --package-path macos/Scanner --configuration release --product AIExposureUpdater
      - name: Assemble app bundle
        run: |
          set -euo pipefail
          rm -rf dist
          mkdir -p dist/AIExposureScanner.app/Contents/MacOS
          mkdir -p dist/AIExposureScanner.app/Contents/Resources
          cp macos/AIExposureScanner/Info.plist dist/AIExposureScanner.app/Contents/Info.plist
          cp macos/AIExposureScanner/AppIcon.icns dist/AIExposureScanner.app/Contents/Resources/
          cp macos/Scanner/.build/release/AIExposureScannerApp dist/AIExposureScanner.app/Contents/MacOS/AIExposureScanner
          cp macos/Scanner/.build/release/AIExposureUpdater dist/AIExposureScanner.app/Contents/Resources/AIExposureUpdater
          chmod +x dist/AIExposureScanner.app/Contents/MacOS/AIExposureScanner
          chmod +x dist/AIExposureScanner.app/Contents/Resources/AIExposureUpdater
      - name: Codesign app when certificate is configured
        env:
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${MACOS_CERTIFICATE_P12_BASE64:-}" ] || [ -z "${MACOS_CODESIGN_IDENTITY:-}" ]; then
            echo "Signing secrets not configured; producing unsigned local-test bundle."
            exit 0
          fi
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          echo "$MACOS_CERTIFICATE_P12_BASE64" | base64 --decode > certificate.p12
          security import certificate.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          codesign --force --options runtime --timestamp --entitlements macos/AIExposureScanner/AIExposureScanner.entitlements --sign "$MACOS_CODESIGN_IDENTITY" dist/AIExposureScanner.app
      - name: Notarize app
        env:
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${MACOS_CERTIFICATE_P12_BASE64:-}" ] || [ -z "${APPLE_ID:-}" ]; then
            echo "Notarization secrets not configured; skipping."
            exit 0
          fi
          xcrun notarytool submit dist/AIExposureScanner.app \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --wait
          xcrun stapler staple dist/AIExposureScanner.app
      - name: Create DMG + SHA-256 sidecar
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          DMG_NAME="AIExposureScanner-${VERSION}-macos.dmg"
          hdiutil create -volname "AI Exposure Scanner" \
            -srcfolder dist/AIExposureScanner.app \
            -ov -format UDZO \
            "dist/${DMG_NAME}"
          shasum -a 256 "dist/${DMG_NAME}" | awk -v name="${DMG_NAME}" '{print $1 "  " name}' > "dist/${DMG_NAME}.sha256"
          echo "DMG_NAME=${DMG_NAME}" >> "$GITHUB_ENV"
      - name: Publish to GitHub Release (idempotent)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # Create the release if it does not exist yet — ignore the
          # "already_exists" error that the parallel Windows-release job
          # can produce by winning the race. Then upload with --clobber so
          # re-runs replace the previous asset instead of failing.
          gh release create "$VERSION" \
            --title "$VERSION" \
            --notes "Automated release for $VERSION." \
            --target "${{ github.sha }}" \
            || true
          gh release upload "$VERSION" \
            "dist/${DMG_NAME}" \
            "dist/${DMG_NAME}.sha256" \
            --clobber
