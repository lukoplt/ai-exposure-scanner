name: macOS Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  package:
    name: Build macOS DMG
    runs-on: macos-14
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Build release executable
        run: swift build --package-path macos/Scanner --configuration release --product AIExposureScannerApp
      - name: Assemble app bundle
        run: |
          set -euo pipefail
          rm -rf dist
          mkdir -p dist/AIExposureScanner.app/Contents/MacOS
          cp macos/AIExposureScanner/Info.plist dist/AIExposureScanner.app/Contents/Info.plist
          cp macos/Scanner/.build/release/AIExposureScannerApp dist/AIExposureScanner.app/Contents/MacOS/AIExposureScanner
          chmod +x dist/AIExposureScanner.app/Contents/MacOS/AIExposureScanner
      - name: Codesign app when certificate is configured
        env:
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${MACOS_CERTIFICATE_P12_BASE64:-}" ] || [ -z "${MACOS_CODESIGN_IDENTITY:-}" ]; then
            echo "Signing secrets not configured; producing unsigned local-test bundle."
            exit 0
          fi
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          echo "$MACOS_CERTIFICATE_P12_BASE64" | base64 --decode > certificate.p12
          security import certificate.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          codesign --force --options runtime --timestamp --entitlements macos/AIExposureScanner/AIExposureScanner.entitlements --sign "$MACOS_CODESIGN_IDENTITY" dist/AIExposureScanner.app
      - name: Notarize app
        env:
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${MACOS_CERTIFICATE_P12_BASE64:-}" ] || [ -z "${APPLE_ID:-}" ]; then
            echo "Notarization secrets not configured; skipping."
            exit 0
          fi
          xcrun notarytool submit dist/AIExposureScanner.app \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --wait
          xcrun stapler staple dist/AIExposureScanner.app
      - name: Create DMG
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          hdiutil create -volname "AI Exposure Scanner" \
            -srcfolder dist/AIExposureScanner.app \
            -ov -format UDZO \
            "dist/AIExposureScanner-${VERSION}-macos.dmg"
          echo "DMG_NAME=AIExposureScanner-${VERSION}-macos.dmg" >> "$GITHUB_ENV"
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@c062e08bd532815e2082a85e87e3ef29c3e6d191 # v2.0.8
        with:
          files: dist/${{ env.DMG_NAME }}
