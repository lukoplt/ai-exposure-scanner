name: Core CI

on:
  pull_request:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  drift-check:
    name: Drift check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"
      - name: Verify rule implementations
        run: python tools/drift-check/drift_check.py
      - name: Test drift-check parser
        run: python -B tools/drift-check/test_drift_check.py

  swift-scanner:
    name: Swift scanner
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Build Scanner package
        run: swift build --package-path macos/Scanner
      - name: Build macOS app shell
        run: swift build --package-path macos/Scanner --product AIExposureScannerApp
      - name: Run fixture corpus
        run: swift run --package-path macos/Scanner ScannerFixtureTests

  dotnet-scanner:
    name: .NET scanner
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-dotnet@87b7050bc53ea08284295505d98d2aa94301e852 # v4.0.1
        with:
          dotnet-version: "10.0.x"
      - name: Restore NuGet packages
        run: dotnet restore windows/AIExposureScanner.sln
      - name: Build Scanner library
        run: dotnet build windows/Scanner/Scanner.csproj --configuration Release --no-restore
      - name: Build Scanner tests
        run: dotnet build windows/Scanner.Tests/Scanner.Tests.csproj --configuration Release --no-restore
      - name: Build Scanner CLI
        run: dotnet build windows/Scanner.Cli/Scanner.Cli.csproj --configuration Release --no-restore
      - name: Build Windows app
        run: dotnet build windows/AIExposureScanner.App/AIExposureScanner.App.csproj --configuration Release --no-restore
      - name: Run fixture corpus
        run: dotnet run --project windows/Scanner.Tests/Scanner.Tests.csproj --configuration Release --no-build
      - name: Check CLI help
        run: dotnet run --project windows/Scanner.Cli/Scanner.Cli.csproj --configuration Release --no-build -- --help

  privacy-grep:
    name: Privacy grep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Block network APIs in scanner libraries
        run: |
          python - <<'PY'
          from pathlib import Path

          # Only the Scanner library itself must be free of network APIs.
          # The standalone updater binary (AIExposureUpdater) intentionally
          # uses URLSession and lives outside the Scanner library.
          roots = [Path("macos/Scanner/Sources/Scanner"), Path("windows/Scanner")]
          needles = ["URLSession", "URLRequest", "HttpClient", "HttpWebRequest", "WebClient"]
          excluded_parts = {"bin", "obj", ".build", ".swiftpm"}
          hits = []

          for root in roots:
              for path in root.rglob("*"):
                  if excluded_parts.intersection(path.parts):
                      continue
                  if path.is_file():
                      text = path.read_text(encoding="utf-8", errors="ignore")
                      for needle in needles:
                          if needle in text:
                              hits.append(f"{path}: contains {needle}")

          if hits:
              print("\n".join(hits))
              raise SystemExit(1)
          PY
