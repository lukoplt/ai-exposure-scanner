name: Windows Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

# Required so softprops/action-gh-release can create the GitHub Release
# entry and upload assets via the default GITHUB_TOKEN.
permissions:
  contents: write

jobs:
  package:
    name: Build Windows artifacts
    runs-on: windows-2025-vs2026
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
      # Framework-dependent build (requires .NET 10 runtime on the user's
      # machine) instead of self-contained single-file. The single-file
      # unpacker stub triggers aggressive Defender heuristics; framework-
      # dependent output is plain DLLs + small EXE that Defender treats
      # like any other .NET app. Users without code signing get fewer
      # false positives this way.
      - name: Publish desktop app
        run: dotnet publish windows/AIExposureScanner.App/AIExposureScanner.App.csproj --configuration Release --runtime win-x64 --self-contained false --output dist/windows-app
      - name: Publish CLI
        run: dotnet publish windows/Scanner.Cli/Scanner.Cli.csproj --configuration Release --runtime win-x64 --self-contained false --output dist/windows-cli
      - name: Copy MSIX manifest declaration
        run: copy windows\AIExposureScanner.App\Package.appxmanifest dist\Package.appxmanifest
      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress
      - name: Build Inno Setup installer
        shell: pwsh
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          # Strip the leading "v" from the tag for AppVersion (Inno wants
          # bare numeric versions in VersionInfoVersion).
          $bareVersion = $env:VERSION -replace '^v',''
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            /Q "/DAppVersion=$bareVersion" `
            windows/Installer/AIExposureScanner.iss
      - name: Archive artifacts + emit SHA-256 sidecars
        shell: pwsh
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          $bareVersion = $env:VERSION -replace '^v',''
          $appZip   = "AIExposureScanner-${env:VERSION}-windows-app.zip"
          $cliZip   = "AIExposureScanner-${env:VERSION}-windows-cli.zip"
          $setupExe = "AIExposureScanner-v${bareVersion}-windows-setup.exe"
          Compress-Archive -Path dist/windows-app/* -DestinationPath "dist/$appZip" -Force
          Compress-Archive -Path dist/windows-cli/* -DestinationPath "dist/$cliZip" -Force

          # Generate SHA-256 sidecars so users can verify integrity even
          # though the binaries are unsigned.
          foreach ($file in @($appZip, $cliZip, $setupExe)) {
            $hash = Get-FileHash "dist/$file" -Algorithm SHA256
            "$($hash.Hash.ToLower())  $file" | Out-File "dist/$file.sha256" -Encoding ascii
          }

          "APP_ZIP_NAME=$appZip"     | Out-File -FilePath $env:GITHUB_ENV -Append
          "CLI_ZIP_NAME=$cliZip"     | Out-File -FilePath $env:GITHUB_ENV -Append
          "SETUP_EXE_NAME=$setupExe" | Out-File -FilePath $env:GITHUB_ENV -Append
      - name: Publish to GitHub Release (idempotent)
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ github.ref_name }}
        run: |
          # Create the release if it does not exist yet — ignore the
          # "already_exists" error that the parallel macOS-release job
          # can produce by winning the race. Then upload with --clobber
          # so re-runs replace the previous asset instead of failing.
          gh release create "$env:VERSION" `
            --title "$env:VERSION" `
            --notes "Automated release for $env:VERSION." `
            --target "${{ github.sha }}"
          if ($LASTEXITCODE -ne 0) {
            Write-Host "release create returned non-zero — assuming it already exists, continuing."
          }
          gh release upload "$env:VERSION" `
            "dist/$env:SETUP_EXE_NAME" `
            "dist/$env:SETUP_EXE_NAME.sha256" `
            "dist/$env:APP_ZIP_NAME" `
            "dist/$env:APP_ZIP_NAME.sha256" `
            "dist/$env:CLI_ZIP_NAME" `
            "dist/$env:CLI_ZIP_NAME.sha256" `
            "dist/Package.appxmanifest" `
            --clobber
