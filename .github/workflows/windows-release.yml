name: Windows Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  package:
    name: Build Windows artifacts
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Publish desktop app
        run: dotnet publish windows/AIExposureScanner.App/AIExposureScanner.App.csproj --configuration Release --runtime win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true --output dist/windows-app
      - name: Publish CLI
        run: dotnet publish windows/Scanner.Cli/Scanner.Cli.csproj --configuration Release --runtime win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true --output dist/windows-cli
      - name: Copy MSIX manifest declaration
        run: copy windows\AIExposureScanner.App\Package.appxmanifest dist\Package.appxmanifest
      - name: Archive artifacts
        shell: pwsh
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          $appZip = "AIExposureScanner-${env:VERSION}-windows-app.zip"
          $cliZip = "AIExposureScanner-${env:VERSION}-windows-cli.zip"
          Compress-Archive -Path dist/windows-app/* -DestinationPath "dist/$appZip" -Force
          Compress-Archive -Path dist/windows-cli/* -DestinationPath "dist/$cliZip" -Force
          "APP_ZIP_NAME=$appZip" | Out-File -FilePath $env:GITHUB_ENV -Append
          "CLI_ZIP_NAME=$cliZip" | Out-File -FilePath $env:GITHUB_ENV -Append
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/${{ env.APP_ZIP_NAME }}
            dist/${{ env.CLI_ZIP_NAME }}
            dist/Package.appxmanifest
